services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: afr-clickhouse
    ports:
      - "8123:8123" # HTTP interface (clients + ingest)
      - "9000:9000" # native protocol
    environment:
      CLICKHOUSE_DB: afr
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse:/schema:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 24

volumes:
  clickhouse-data:
